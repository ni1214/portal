<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生産管理課 ポータル</title>
  <meta name="description" content="生産管理課の社内ポータルサイト。業務に必要な情報やツールへ素早くアクセスできます。">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ==================== Header ==================== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">
          <i class="fa-solid fa-industry"></i>
        </div>
        <div>
          <div class="header-title">生産管理課 ポータル</div>
          <div class="header-subtitle">Production Management Portal</div>
        </div>
      </div>

      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="メニューを検索..." autocomplete="off">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
      </div>

      <div class="header-clock">
        <i class="fa-regular fa-clock"></i>
        <span id="header-clock"></span>
      </div>
    </div>
  </header>

  <!-- 編集モードバナー -->
  <div class="edit-mode-banner" id="edit-banner" hidden>
    <i class="fa-solid fa-pen-to-square"></i>
    編集モード中 — カードにカーソルを合わせて編集・削除、カテゴリ末尾の「＋」で追加
  </div>

  <!-- ==================== Main ==================== -->
  <main class="main">
    <!-- カードは script.js が動的に挿入します -->
    <div class="no-results" id="no-results">
      <i class="fa-solid fa-magnifying-glass"></i>
      <p>該当するメニューが見つかりません</p>
    </div>
  </main>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <p>© 2026 生産管理課 ポータルサイト</p>
  </footer>

  <!-- ==================== 管理者FABボタン ==================== -->
  <button class="admin-fab" id="admin-fab" title="管理者ログイン">
    <i class="fa-solid fa-lock"></i>
  </button>

  <!-- ==================== PIN認証モーダル ==================== -->
  <div class="modal-overlay" id="pin-modal">
    <div class="modal-glass">
      <h3 class="modal-title" id="pin-modal-title">管理者認証</h3>
      <p class="modal-desc" id="pin-modal-desc">4桁のPINを入力してください</p>

      <div class="pin-inputs">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
      </div>

      <div id="pin-confirm-group" style="display:none">
        <p class="modal-desc" style="text-align:center;margin-bottom:0.5rem">確認のため再入力</p>
        <div class="pin-inputs">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
        </div>
      </div>

      <p class="pin-error" id="pin-error"></p>

      <div class="modal-actions">
        <button class="btn-modal-secondary" id="pin-cancel">キャンセル</button>
        <button class="btn-modal-primary" id="pin-submit">認証</button>
      </div>
    </div>
  </div>

  <!-- ==================== カード編集モーダル ==================== -->
  <div class="modal-overlay" id="card-modal">
    <div class="modal-glass">
      <h3 class="modal-title" id="card-modal-title">カードを編集</h3>

      <div class="form-group">
        <label class="form-label">カード名</label>
        <input type="text" id="edit-label" class="form-input" placeholder="例: 工程管理">
      </div>

      <div class="form-group" id="edit-icon-group">
        <label class="form-label">アイコン</label>
        <!-- アイコンピッカー -->
        <div class="icon-picker" id="icon-picker"></div>
        <!-- 直接入力（上級者向け） -->
        <div class="icon-manual-row">
          <div class="icon-preview" id="icon-preview"></div>
          <input type="text" id="edit-icon" class="form-input" placeholder="fa-solid fa-star（直接入力も可）">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">リンク先 URL</label>
        <input type="url" id="edit-url" class="form-input" placeholder="https://...">
      </div>

      <div class="modal-actions">
        <button class="btn-modal-secondary" id="card-cancel">キャンセル</button>
        <button class="btn-modal-danger" id="card-delete" style="display:none">
          <i class="fa-solid fa-trash"></i> 削除
        </button>
        <button class="btn-modal-primary" id="card-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Script (type="module" for Firebase ESM) -->
  <script type="module" src="script.js"></script>
</body>

</html>
