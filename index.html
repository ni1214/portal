<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生産管理課 ポータル</title>
  <meta name="description" content="生産管理課の社内ポータルサイト。業務に必要な情報やツールへ素早くアクセスできます。">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ==================== Header ==================== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">
          <i class="fa-solid fa-industry"></i>
        </div>
        <div>
          <div class="header-title">生産管理課 ポータル</div>
          <div class="header-subtitle">Production Management Portal</div>
        </div>
      </div>

      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="メニューを検索..." autocomplete="off">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
      </div>

      <div class="header-clock">
        <i class="fa-regular fa-clock"></i>
        <span id="header-clock"></span>
      </div>
    </div>
  </header>

  <!-- 編集モードバナー -->
  <div class="edit-mode-banner" id="edit-banner" hidden>
    <i class="fa-solid fa-pen-to-square"></i>
    編集モード中 — カードにカーソルを合わせて編集・削除、カテゴリ末尾の「＋」で追加
  </div>

  <!-- ==================== Main ==================== -->
  <main class="main">

    <!-- お気に入りセクション（JS が制御） -->
    <section id="favorites-section" class="favorites-section category-section" hidden>
      <div class="category-header">
        <div class="category-icon" style="background: linear-gradient(135deg, #ffcc00, #dd9900)">
          <i class="fa-solid fa-star"></i>
        </div>
        <h2 class="category-title">お気に入り</h2>
        <span class="category-count" id="favorites-count">0 件</span>
      </div>
      <div class="card-grid" id="favorites-grid"></div>
    </section>

    <!-- お知らせボード（JS が制御） -->
    <section id="notice-board" class="notice-board"></section>

    <!-- 天気ウィジェット -->
    <section id="weather-widget" class="weather-widget">
      <div class="weather-section-header">
        <div class="weather-title-area">
          <i class="fa-solid fa-cloud-sun weather-section-icon"></i>
          <span class="weather-section-title">高崎市の天気</span>
        </div>
        <span id="weather-updated" class="weather-updated"></span>
      </div>
      <div class="weather-body">
        <div id="weather-current" class="weather-current">
          <div class="weather-loading"><i class="fa-solid fa-spinner fa-spin"></i> 天気情報を取得中...</div>
        </div>
        <div id="weather-forecast" class="forecast-scroll"></div>
      </div>
      <button id="toggle-radar" class="btn-toggle-radar">
        <i class="fa-solid fa-map"></i> 雨雲レーダーを表示
      </button>
      <div id="weather-radar" class="radar-wrap" hidden>
        <iframe id="windy-frame" class="radar-iframe" allowfullscreen></iframe>
      </div>
    </section>

    <!-- カードは script.js が動的に挿入します -->
    <div class="no-results" id="no-results">
      <i class="fa-solid fa-magnifying-glass"></i>
      <p>該当するメニューが見つかりません</p>
    </div>
  </main>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <p>© 2026 生産管理課 ポータルサイト</p>
  </footer>

  <!-- ==================== 管理者FABボタン ==================== -->
  <button class="admin-fab" id="admin-fab" title="管理者ログイン">
    <i class="fa-solid fa-lock"></i>
  </button>

  <!-- ==================== 太陽光発電 全画面オーバーレイ ==================== -->
  <div id="solar-overlay" class="solar-overlay" hidden>
    <div class="solar-toolbar">
      <div class="solar-toolbar-title">
        <i class="fa-solid fa-solar-panel"></i>
        <span>太陽光発電モニタリング</span>
      </div>
      <div class="solar-toolbar-actions">
        <a href="https://mierukaweb.energymntr.com/48429893PZ" target="_blank" rel="noopener" class="btn-solar-external">
          <i class="fa-solid fa-arrow-up-right-from-square"></i> 別タブで開く
        </a>
        <button id="solar-close" class="btn-solar-close" title="閉じる">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
    <iframe id="solar-frame"
      src="https://mierukaweb.energymntr.com/48429893PZ"
      class="solar-iframe"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      title="太陽光発電モニタリング"></iframe>
  </div>

  <!-- ==================== PIN認証モーダル ==================== -->
  <div class="modal-overlay" id="pin-modal">
    <div class="modal-glass">
      <h3 class="modal-title" id="pin-modal-title">管理者認証</h3>
      <p class="modal-desc" id="pin-modal-desc">4桁のPINを入力してください</p>

      <div class="pin-inputs">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
        <input type="text" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
      </div>

      <div id="pin-confirm-group" style="display:none">
        <p class="modal-desc" style="text-align:center;margin-bottom:0.5rem">確認のため再入力</p>
        <div class="pin-inputs">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
          <input type="text" inputmode="numeric" maxlength="1" class="pin-digit-confirm" autocomplete="off">
        </div>
      </div>

      <p class="pin-error" id="pin-error"></p>

      <div class="modal-actions">
        <button class="btn-modal-secondary" id="pin-cancel">キャンセル</button>
        <button class="btn-modal-primary" id="pin-submit">認証</button>
      </div>
    </div>
  </div>

  <!-- ==================== カード編集モーダル ==================== -->
  <div class="modal-overlay" id="card-modal">
    <div class="modal-glass">
      <h3 class="modal-title" id="card-modal-title">カードを編集</h3>

      <div class="form-group">
        <label class="form-label">カード名</label>
        <input type="text" id="edit-label" class="form-input" placeholder="例: 工程管理">
      </div>

      <div class="form-group" id="edit-icon-group">
        <label class="form-label">アイコン</label>
        <div class="icon-picker" id="icon-picker"></div>
        <div class="icon-manual-row">
          <div class="icon-preview" id="icon-preview"></div>
          <input type="text" id="edit-icon" class="form-input" placeholder="fa-solid fa-star（直接入力も可）">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">リンク先 URL</label>
        <input type="url" id="edit-url" class="form-input" placeholder="https://...">
      </div>

      <div class="modal-actions">
        <button class="btn-modal-secondary" id="card-cancel">キャンセル</button>
        <button class="btn-modal-danger" id="card-delete" style="display:none">
          <i class="fa-solid fa-trash"></i> 削除
        </button>
        <button class="btn-modal-primary" id="card-save">保存</button>
      </div>
    </div>
  </div>

  <!-- ==================== お知らせ編集モーダル ==================== -->
  <div class="modal-overlay" id="notice-modal">
    <div class="modal-glass">
      <h3 class="modal-title" id="notice-modal-title">お知らせを追加</h3>

      <div class="form-group">
        <label class="form-label">優先度</label>
        <select id="notice-priority" class="form-input">
          <option value="normal">通常</option>
          <option value="urgent">重要</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">タイトル</label>
        <input type="text" id="notice-title" class="form-input" placeholder="例: 明日は工場予定変更">
      </div>

      <div class="form-group">
        <label class="form-label">本文（省略可）</label>
        <textarea id="notice-body" class="form-input" rows="3" placeholder="詳細メッセージ..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-modal-secondary" id="notice-cancel">キャンセル</button>
        <button class="btn-modal-danger" id="notice-delete" style="display:none">
          <i class="fa-solid fa-trash"></i> 削除
        </button>
        <button class="btn-modal-primary" id="notice-save">保存</button>
      </div>
    </div>
  </div>

  <!-- ==================== カテゴリ編集モーダル ==================== -->
  <div class="modal-overlay" id="category-modal">
    <div class="modal-glass">
      <h3 class="modal-title" id="category-modal-title">カテゴリを追加</h3>

      <div class="form-group">
        <label class="form-label">カテゴリ名</label>
        <input type="text" id="cat-label" class="form-input" placeholder="例: 品質管理">
      </div>

      <div class="form-group">
        <label class="form-label">アイコン</label>
        <div class="icon-manual-row">
          <div class="icon-preview" id="cat-icon-preview"></div>
          <input type="text" id="cat-icon" class="form-input" placeholder="fa-solid fa-star">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">カラー</label>
        <div id="color-picker-grid" class="color-picker-grid"></div>
      </div>

      <div class="modal-actions">
        <button class="btn-modal-secondary" id="cat-cancel">キャンセル</button>
        <button class="btn-modal-danger" id="cat-delete" style="display:none">
          <i class="fa-solid fa-trash"></i> 削除
        </button>
        <button class="btn-modal-primary" id="cat-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Script (type="module" for Firebase ESM) -->
  <script type="module" src="script.js"></script>
</body>

</html>
