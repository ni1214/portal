<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生産管理課 ポータル</title>
  <meta name="description" content="生産管理課の社内ポータルサイト。業務に必要な情報やツールへ素早くアクセスできます。">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ==================== Header ==================== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo">
          <i class="fa-solid fa-industry"></i>
        </div>
        <div>
          <div class="header-title">生産管理課 ポータル</div>
          <div class="header-subtitle">Production Management Portal</div>
        </div>
      </div>

      <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="メニューを検索..." autocomplete="off">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
      </div>

      <div class="header-clock">
        <i class="fa-regular fa-clock"></i>
        <span id="header-clock"></span>
      </div>
    </div>
  </header>

  <!-- ==================== Main ==================== -->
  <main class="main">

    <!-- External Tools -->
    <section class="external-tools" id="section-external">
      <div class="category-header">
        <div class="category-icon" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);"><i
            class="fa-solid fa-arrow-up-right-from-square"></i></div>
        <h2 class="category-title">外部ツール</h2>
      </div>
      <div class="external-grid">

        <!-- Notion -->
        <a href="#" class="external-card external-notion" id="card-notion" target="_blank">
          <div class="external-icon">
            <svg viewBox="0 0 100 100" width="40" height="40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M6.017 4.313l55.333 -4.087c6.797 -0.583 8.543 -0.19 12.817 2.917l17.663 12.443c2.913 2.14 3.883 2.723 3.883 5.053v68.243c0 4.277 -1.553 6.807 -6.99 7.193L24.467 99.967c-4.08 0.193 -6.023 -0.39 -8.16 -3.113L3.3 79.94c-2.333 -3.113 -3.3 -5.443 -3.3 -8.167V11.113c0 -3.497 1.553 -6.413 6.017 -6.8z"
                fill="#fff" />
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M61.35 0.227l-55.333 4.087C1.553 4.7 0 7.617 0 11.113v60.66c0 2.723 0.967 5.053 3.3 8.167l12.007 16.913c2.137 2.723 4.08 3.307 8.16 3.113l64.257 -3.89c5.433 -0.387 6.99 -2.917 6.99 -7.193V20.64c0 -2.21 -0.873 -2.847 -3.443 -4.733L74.167 3.143C69.893 0.037 68.147 -0.357 61.35 0.227zM25.505 19.463c-5.357 0.388 -6.57 0.477 -9.61 -1.853l-6.423 -5.053c-0.97 -0.78 -0.453 -1.747 1.167 -1.94l52.55 -3.887c4.857 -0.387 7.3 1.167 9.053 2.527l7.88 5.733c0.387 0.387 1.36 1.36 0.193 1.36l-54.42 3.307 -0.39 -0.193zM19.803 88.3V30.367c0 -2.53 0.777 -3.697 3.103 -3.893L86 23.127c2.14 -0.193 3.107 1.167 3.107 3.693v57.547c0 2.53 -0.39 4.667 -3.883 4.857l-60.377 3.5c-3.493 0.193 -5.043 -0.97 -5.043 -4.423zM78.96 33.667c0.387 1.75 0 3.5 -1.75 3.7l-2.917 0.577v42.773c-2.527 1.36 -4.853 2.14 -6.797 2.14 -3.107 0 -3.883 -0.973 -6.21 -3.887l-19.03 -29.94v28.967l6.077 1.36s0 3.5 -4.853 3.5l-13.39 0.777c-0.39 -0.78 0 -2.723 1.357 -3.11l3.497 -0.97v-38.3L30.48 40.667c-0.39 -1.75 0.58 -4.277 3.3 -4.473l14.367 -0.967 19.8 30.327v-26.83l-5.047 -0.58c-0.39 -2.143 1.163 -3.7 3.103 -3.89l13.957 -0.587z"
                fill="#000" />
            </svg>
          </div>
          <span class="external-label">Notion</span>
        </a>

        <!-- Slack -->
        <a href="#" class="external-card external-slack" id="card-slack" target="_blank">
          <div class="external-icon">
            <svg viewBox="0 0 127 127" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M27.2 80c0 7.3-5.9 13.2-13.2 13.2C6.7 93.2.8 87.3.8 80c0-7.3 5.9-13.2 13.2-13.2h13.2V80zm6.6 0c0-7.3 5.9-13.2 13.2-13.2 7.3 0 13.2 5.9 13.2 13.2v33c0 7.3-5.9 13.2-13.2 13.2-7.3 0-13.2-5.9-13.2-13.2V80z"
                fill="#E01E5A" />
              <path
                d="M47 27c-7.3 0-13.2-5.9-13.2-13.2C33.8 6.5 39.7.6 47 .6c7.3 0 13.2 5.9 13.2 13.2V27H47zm0 6.7c7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2H13.9C6.6 60.1.7 54.2.7 46.9c0-7.3 5.9-13.2 13.2-13.2H47z"
                fill="#36C5F0" />
              <path
                d="M99.9 46.9c0-7.3 5.9-13.2 13.2-13.2 7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2H99.9V46.9zm-6.6 0c0 7.3-5.9 13.2-13.2 13.2-7.3 0-13.2-5.9-13.2-13.2V13.8C66.9 6.5 72.8.6 80.1.6c7.3 0 13.2 5.9 13.2 13.2v33.1z"
                fill="#2EB67D" />
              <path
                d="M80.1 99.8c7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2-7.3 0-13.2-5.9-13.2-13.2V99.8h13.2zm0-6.6c-7.3 0-13.2-5.9-13.2-13.2 0-7.3 5.9-13.2 13.2-13.2h33.1c7.3 0 13.2 5.9 13.2 13.2 0 7.3-5.9 13.2-13.2 13.2H80.1z"
                fill="#ECB22E" />
            </svg>
          </div>
          <span class="external-label">Slack</span>
        </a>

        <!-- Google Drive -->
        <a href="#" class="external-card external-gdrive" id="card-gdrive" target="_blank">
          <div class="external-icon">
            <svg viewBox="0 0 87.3 78" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
              <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z"
                fill="#0066da" />
              <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-20.4 35.3c-.8 1.4-1.2 2.95-1.2 4.5h27.5z"
                fill="#00ac47" />
              <path
                d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z"
                fill="#ea4335" />
              <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d" />
              <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc" />
              <path
                d="m73.4 26.5-10.1-17.5c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 23.8h27.45c0-1.55-.4-3.1-1.2-4.5z"
                fill="#ffba00" />
            </svg>
          </div>
          <span class="external-label">Google Drive</span>
        </a>

      </div>
    </section>

    <!-- Category 1: 管理・報告 -->
    <section class="category-section category-1" id="section-management">
      <div class="category-header">
        <div class="category-icon"><i class="fa-solid fa-clipboard-check"></i></div>
        <h2 class="category-title">管理・報告</h2>
        <span class="category-count"></span>
      </div>
      <div class="card-grid">
        <a href="#" class="link-card" id="card-process-management">
          <div class="card-icon"><i class="fa-solid fa-bars-progress"></i></div>
          <span class="card-label">工程管理</span>
        </a>
        <a href="#" class="link-card" id="card-drawing-storage">
          <div class="card-icon"><i class="fa-solid fa-folder-open"></i></div>
          <span class="card-label">図面保管庫</span>
        </a>
        <a href="#" class="link-card" id="card-address-book">
          <div class="card-icon"><i class="fa-solid fa-address-book"></i></div>
          <span class="card-label">アドレス帳</span>
        </a>
        <a href="#" class="link-card" id="card-trouble-report">
          <div class="card-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
          <span class="card-label">トラブル報告</span>
        </a>
        <a href="#" class="link-card" id="card-trouble-response">
          <div class="card-icon"><i class="fa-solid fa-comment-dots"></i></div>
          <span class="card-label">トラブル回答</span>
        </a>
      </div>
    </section>

    <!-- Category 2: 手配・製作 -->
    <section class="category-section category-2" id="section-arrangement">
      <div class="category-header">
        <div class="category-icon"><i class="fa-solid fa-gears"></i></div>
        <h2 class="category-title">手配・製作</h2>
        <span class="category-count"></span>
      </div>
      <div class="card-grid">
        <a href="#" class="link-card" id="card-arrangement-create">
          <div class="card-icon"><i class="fa-solid fa-file-circle-plus"></i></div>
          <span class="card-label">手配書作成</span>
        </a>
        <a href="#" class="link-card" id="card-arrangement-list">
          <div class="card-icon"><i class="fa-solid fa-list-check"></i></div>
          <span class="card-label">手配書リスト</span>
        </a>
        <a href="#" class="link-card" id="card-factory-schedule">
          <div class="card-icon"><i class="fa-solid fa-calendar-days"></i></div>
          <span class="card-label">工場予定表</span>
        </a>
        <a href="#" class="link-card" id="card-outsource">
          <div class="card-icon"><i class="fa-solid fa-handshake"></i></div>
          <span class="card-label">外注製作</span>
        </a>
        <a href="#" class="link-card" id="card-fittings-management">
          <div class="card-icon"><i class="fa-solid fa-door-open"></i></div>
          <span class="card-label">建具管理</span>
        </a>
      </div>
    </section>

    <!-- Category 3: 金物・在庫 -->
    <section class="category-section category-3" id="section-hardware">
      <div class="category-header">
        <div class="category-icon"><i class="fa-solid fa-cubes"></i></div>
        <h2 class="category-title">金物・在庫</h2>
        <span class="category-count"></span>
      </div>
      <div class="card-grid">
        <a href="#" class="link-card" id="card-standard-hardware">
          <div class="card-icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
          <span class="card-label">標準金物</span>
        </a>
        <a href="#" class="link-card" id="card-hardware-docs">
          <div class="card-icon"><i class="fa-solid fa-file-lines"></i></div>
          <span class="card-label">金物資料</span>
        </a>
        <a href="#" class="link-card" id="card-factory-stock">
          <div class="card-icon"><i class="fa-solid fa-warehouse"></i></div>
          <span class="card-label">工場在庫</span>
        </a>
        <a href="#" class="link-card" id="card-electricity">
          <div class="card-icon"><i class="fa-solid fa-bolt"></i></div>
          <span class="card-label">電気代</span>
        </a>
      </div>
    </section>

    <!-- Category 4: 資材・設計 -->
    <section class="category-section category-4" id="section-materials">
      <div class="category-header">
        <div class="category-icon"><i class="fa-solid fa-drafting-compass"></i></div>
        <h2 class="category-title">資材・設計</h2>
        <span class="category-count"></span>
      </div>
      <div class="card-grid">
        <a href="#" class="link-card" id="card-filler">
          <div class="card-icon"><i class="fa-solid fa-fill-drip"></i></div>
          <span class="card-label">充填材</span>
        </a>
        <a href="#" class="link-card" id="card-steel">
          <div class="card-icon"><i class="fa-solid fa-bars"></i></div>
          <span class="card-label">鋼材</span>
        </a>
        <a href="#" class="link-card" id="card-steel-order">
          <div class="card-icon"><i class="fa-solid fa-cart-shopping"></i></div>
          <span class="card-label">鋼材注文</span>
        </a>
        <a href="#" class="link-card" id="card-drawing-storage-2">
          <div class="card-icon"><i class="fa-solid fa-box-archive"></i></div>
          <span class="card-label">図面保管庫</span>
        </a>
        <a href="#" class="link-card" id="card-mold-simulator">
          <div class="card-icon"><i class="fa-solid fa-calculator"></i></div>
          <span class="card-label">金型シミュレーター</span>
        </a>
      </div>
    </section>

    <!-- Category 5: その他 -->
    <section class="category-section category-5" id="section-others">
      <div class="category-header">
        <div class="category-icon"><i class="fa-solid fa-ellipsis"></i></div>
        <h2 class="category-title">その他</h2>
        <span class="category-count"></span>
      </div>
      <div class="card-grid">
        <a href="#" class="link-card" id="card-manual">
          <div class="card-icon"><i class="fa-solid fa-book"></i></div>
          <span class="card-label">マニュアル</span>
        </a>
        <a href="#" class="link-card" id="card-download">
          <div class="card-icon"><i class="fa-solid fa-download"></i></div>
          <span class="card-label">資料ダウンロード</span>
        </a>
        <a href="#" class="link-card" id="card-reference-drawing">
          <div class="card-icon"><i class="fa-solid fa-ruler-combined"></i></div>
          <span class="card-label">基準図</span>
        </a>
        <a href="#" class="link-card" id="card-survey">
          <div class="card-icon"><i class="fa-solid fa-square-poll-vertical"></i></div>
          <span class="card-label">アンケート(回答)</span>
        </a>
        <a href="#" class="link-card" id="card-daily-report">
          <div class="card-icon"><i class="fa-solid fa-truck"></i></div>
          <span class="card-label">運行作業日報</span>
        </a>
      </div>
    </section>

    <!-- No Results -->
    <div class="no-results" id="no-results">
      <i class="fa-solid fa-magnifying-glass"></i>
      <p>該当するメニューが見つかりません</p>
    </div>

  </main>

  <!-- ==================== Footer ==================== -->
  <footer class="footer">
    <p>© 2026 生産管理課 ポータルサイト</p>
  </footer>

  <!-- Script -->
  <script src="script.js"></script>
</body>

</html>
