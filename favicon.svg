<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>

  <!-- 背景: 角丸ダークネイビー -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 棒グラフ (左から順に低→高) -->
  <rect x="4"  y="20" width="5" height="8"  rx="1.5" fill="url(#bar)" opacity="0.65"/>
  <rect x="12" y="14" width="5" height="14" rx="1.5" fill="url(#bar)" opacity="0.82"/>
  <rect x="20" y="8"  width="6" height="20" rx="1.5" fill="url(#bar)"/>

  <!-- トレンドライン -->
  <polyline points="6.5,19 14.5,13 23,7"
    fill="none" stroke="#7ec8ff" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- 先端の点 -->
  <circle cx="23" cy="7" r="1.8" fill="#4a9eff"/>
</svg>
